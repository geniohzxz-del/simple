<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>簡化計算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: 
      radial-gradient(circle at 20% 10%, #fde68a 0%, transparent 50%),
      radial-gradient(circle at 80% 90%, #fdba74 0%, transparent 50%),
      linear-gradient(180deg, #fef3c7 0%, #fed7aa 100%);
    min-height: 100vh;
    padding: 14px 10px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    color: #78350f;
  }
  .header { text-align: center; margin-bottom: 10px; }
  h1 {
    font-family: "Fredoka", "Noto Sans TC", sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #78350f;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  h1 .emoji { display: inline-block; transform: rotate(-8deg); }
  .subtitle {
    font-size: 13px;
    color: #b45309;
    margin-top: 4px;
    font-weight: 500;
  }
  .mode-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    width: 100%;
    max-width: 760px;
    margin-bottom: 10px;
  }
  .mode-btn {
    padding: 8px 3px;
    border: none;
    border-radius: 11px;
    background: rgba(255, 255, 255, 0.7);
    font-family: "Fredoka", "Noto Sans TC", sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    color: #94a3b8;
    box-shadow: 0 1px 3px rgba(146, 64, 14, 0.08);
    transition: all 0.15s;
    line-height: 1.25;
  }
  .mode-btn.active {
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  }
  .mode-btn.active[data-mode="add100"]   { background: #f59e0b; }
  .mode-btn.active[data-mode="add1000"]  { background: #10b981; }
  .mode-btn.active[data-mode="add10000"] { background: #3b82f6; }
  .mode-btn.active[data-mode="multiply"] { background: #ec4899; }
  .mode-btn.active[data-mode="chain"]    { background: #8b5cf6; }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 760px;
    margin-bottom: 10px;
  }
  .stat {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    padding: 6px 4px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(146, 64, 14, 0.08);
  }
  .stat-label {
    font-size: 10px;
    color: #b45309;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-family: "Fredoka", sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #78350f;
    line-height: 1.1;
    margin-top: 1px;
  }
  .formula {
    background: white;
    padding: 10px 14px;
    border-radius: 16px;
    margin-bottom: 10px;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 4px 12px rgba(146, 64, 14, 0.12);
    width: 100%;
    max-width: 760px;
    font-family: "Fredoka", sans-serif;
    flex-wrap: nowrap;
  }
  .f-num {
    font-size: 22px;
    font-weight: 700;
    min-width: 36px;
    text-align: center;
    flex-shrink: 1;
  }
  .f-num.long { font-size: 17px; }
  .f-num.xlong { font-size: 13px; }
  .f-num.empty { color: #cbd5e1; }
  .f-num.pos { color: #0369a1; }
  .f-num.neg { color: #be123c; }
  .f-op {
    font-size: 17px;
    color: #94a3b8;
    font-weight: 600;
    flex-shrink: 0;
  }
  .f-result {
    font-size: 22px;
    font-weight: 700;
    min-width: 50px;
    text-align: center;
    color: #cbd5e1;
    transition: color 0.2s;
    flex-shrink: 1;
  }
  .f-result.long { font-size: 17px; }
  .f-result.xlong { font-size: 13px; }
  .f-result.valid { color: #16a34a; animation: pulse 0.4s ease; }
  .f-result.invalid { color: #dc2626; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    width: 100%;
    max-width: 760px;
    margin-bottom: 12px;
  }
  .tile {
    aspect-ratio: 1;
    background: #ffffff;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fredoka", sans-serif;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 
      0 2px 0 rgba(146, 64, 14, 0.15),
      0 3px 6px rgba(146, 64, 14, 0.08);
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
    line-height: 1;
    padding: 2px;
  }
  .tile.long { font-size: 16px; }
  .tile.xlong { font-size: 12px; }
  .tile.pos { color: #0369a1; background: #e0f2fe; }
  .tile.neg { color: #be123c; background: #ffe4e6; }
  .tile:active {
    transform: translateY(2px);
    box-shadow: 0 0 0 rgba(146, 64, 14, 0.15);
  }
  .tile.selected {
    background: #fbbf24;
    color: white !important;
    box-shadow: 0 0 0 3px #f59e0b, 0 4px 8px rgba(245, 158, 11, 0.4);
    transform: translateY(-2px);
    z-index: 2;
  }
  .tile.hint { animation: hintPulse 0.8s ease-in-out 2; }
  @keyframes hintPulse {
    0%, 100% { box-shadow: 0 2px 0 rgba(146, 64, 14, 0.15), 0 3px 6px rgba(146, 64, 14, 0.08); }
    50% { box-shadow: 0 0 0 4px #ec4899, 0 4px 12px rgba(236, 72, 153, 0.5); }
  }
  .tile.success { animation: success 0.5s ease forwards; }
  @keyframes success {
    0% { transform: scale(1.05); background: #16a34a; color: white; }
    50% { transform: scale(1.25) rotate(5deg); background: #16a34a; color: white; }
    100% { transform: scale(0) rotate(180deg); opacity: 0; }
  }
  .tile.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-5px); }
    40%, 80% { transform: translateX(5px); }
  }
  .tile.empty {
    background: transparent;
    box-shadow: none;
    pointer-events: none;
  }
  /* CHAIN-mode rows */
  .chain-container {
    display: none;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 760px;
    margin-bottom: 12px;
  }
  .chain-row {
    background: white;
    padding: 10px 8px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: nowrap;
    box-shadow: 0 2px 6px rgba(146, 64, 14, 0.1);
  }
  .chain-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 62px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    border-radius: 14px;
    flex: 1 1 0;
    min-width: 0;
    padding: 0 4px;
    font-size: 28px;
    white-space: nowrap;
    line-height: 1;
    transition: transform 0.1s, box-shadow 0.1s;
    background: #fef3c7;
    color: #92400e;
  }
  .chain-cell.start {
    background: #fef3c7;
    color: #92400e;
  }
  .chain-cell.clickable {
    cursor: pointer;
  }
  .chain-cell.clickable:active {
    transform: translateY(1px);
  }
  .chain-cell.selected {
    background: #fbbf24;
    color: white;
    box-shadow: 0 0 0 3px #f59e0b;
    transform: translateY(-2px);
    z-index: 2;
  }
  .chain-cell.complete {
    background: #16a34a;
    color: white;
    animation: pop 0.5s;
  }
  .chain-cell.shake {
    animation: shake 0.4s ease;
  }
  .chain-cell.hint {
    animation: chainHint 0.8s ease-in-out 2;
  }
  @keyframes chainHint {
    0%, 100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
    50% { box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.5); }
  }
  .chain-equals {
    color: #94a3b8;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    margin: 0 1px;
    font-family: 'Fredoka', sans-serif;
  }
  .chain-cell.answer {
    background: #fef3c7;
    color: #b45309;
    min-width: 38px;
    font-size: 12px;
  }
  .chain-cell.answer.complete, .chain-cell.complete {
    background: #16a34a;
    color: white;
    animation: pop 0.5s;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    80% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .controls {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 760px;
  }
  button.action {
    padding: 11px 12px;
    border: none;
    border-radius: 12px;
    font-family: "Noto Sans TC", sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    flex: 1;
    box-shadow: 0 3px 0 rgba(0,0,0,0.1);
    transition: transform 0.1s, box-shadow 0.1s;
    color: white;
  }
  button.action:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.1);
  }
  .btn-primary { background: #f59e0b; }
  .btn-secondary { background: #8b5cf6; }
  .btn-tertiary { background: #64748b; }
  .rules {
    background: rgba(255,255,255,0.75);
    padding: 10px 14px;
    border-radius: 14px;
    margin-top: 12px;
    max-width: 760px;
    width: 100%;
    font-size: 12px;
    color: #78350f;
    line-height: 1.5;
  }
  .rules-title {
    font-weight: 700;
    color: #78350f;
    margin-bottom: 3px;
    font-size: 12px;
  }
  .examples {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 5px;
  }
  .ex {
    background: white;
    padding: 2px 7px;
    border-radius: 6px;
    font-family: "Fredoka", sans-serif;
    font-size: 11px;
    color: #b45309;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.show { display: flex; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: white;
    padding: 26px 22px;
    border-radius: 22px;
    text-align: center;
    max-width: 320px;
    width: 100%;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .win-emoji {
    font-size: 56px;
    margin-bottom: 6px;
    display: inline-block;
    animation: bounce 1s ease infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .modal h2 {
    font-family: "Fredoka", sans-serif;
    color: #78350f;
    font-size: 24px;
    margin-bottom: 6px;
  }
  .modal p {
    color: #b45309;
    line-height: 1.7;
    margin-bottom: 14px;
    font-size: 14px;
  }
  .modal .stars {
    font-size: 26px;
    margin-bottom: 10px;
    letter-spacing: 4px;
  }
  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    pointer-events: none;
    z-index: 50;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }

  @media (orientation: landscape) {
    body { padding: 10px 12px 18px; }
    h1 { font-size: 36px; }
    .subtitle { font-size: 18px; }
    .mode-btn { font-size: 17px; padding: 10px 6px; }
    .stat-label { font-size: 14px; }
    .stat-value { font-size: 28px; }
    .rules { font-size: 17px; }
    .rules-title { font-size: 17px; }
    .ex { font-size: 16px; padding: 4px 10px; }
    button.action { font-size: 19px; padding: 13px 16px; }
    .chain-container { gap: 10px; }
    .chain-cell { height: 70px; font-size: 34px; }
    .chain-cell.long { font-size: 27px; }
    .chain-cell.xlong { font-size: 21px; }
  }

</style>
</head>
<body>
  <div class="header">
    <h1><span class="emoji">🧮</span> 簡化計算</h1>
    <p class="subtitle" id="subtitle">找到能湊出 100 倍數的兩個格子</p>
  </div>
  
  <div class="mode-bar" id="modeBar">
    <button class="mode-btn active" data-mode="add100">➕<br>百</button>
    <button class="mode-btn" data-mode="add1000">➕<br>千</button>
    <button class="mode-btn" data-mode="add10000">➕<br>萬</button>
    <button class="mode-btn" data-mode="multiply">✖<br>乘法</button>
    <button class="mode-btn" data-mode="chain">×÷<br>乘除</button>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-label" id="statLabel1">已消除</div>
      <div class="stat-value"><span id="stat1Value">0</span><span id="stat1Total">/12</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">出手</div>
      <div class="stat-value" id="stat2Value">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">時間</div>
      <div class="stat-value" id="timer">0:00</div>
    </div>
  </div>
  
  <div class="formula" id="formula">
    <span class="f-num empty" id="sel1">?</span>
    <span class="f-op" id="op">+</span>
    <span class="f-num empty" id="sel2">?</span>
    <span class="f-op">=</span>
    <span class="f-result" id="selResult">?</span>
  </div>
  
  <div class="grid" id="grid"></div>
  <div class="chain-container" id="chainContainer"></div>
  
  <div class="controls">
    <button class="action btn-primary" onclick="newGame()">🔄 新局</button>
    <button class="action btn-secondary" onclick="showHint()">💡 提示</button>
    <button class="action btn-tertiary" onclick="clearSelection()">✖ 取消</button>
  </div>
  
  <div class="rules">
    <div class="rules-title">📖 怎麼玩</div>
    <span id="rulesText"></span>
    <div class="examples" id="rulesExamples"></div>
  </div>
  
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="win-emoji" id="winEmoji">🎉</div>
      <h2 id="winTitle">恭喜過關！</h2>
      <div class="stars" id="stars"></div>
      <p id="winStats"></p>
      <button class="action btn-primary" style="flex:none;min-width:140px;" onclick="newGame()">再玩一次</button>
    </div>
  </div>

<script>
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function sizeClass(s) {
  const len = String(s).length;
  if (len >= 6) return 'xlong';
  if (len >= 4) return 'long';
  return '';
}

function genAddPair(modN, minMag, maxMag) {
  if (Math.random() < 0.3) {
    const a = randInt(minMag, maxMag);
    return [a, -a];
  }
  const negative = Math.random() < 0.3;
  const sign = negative ? -1 : 1;
  const minSum = 2 * minMag;
  const maxSum = 2 * maxMag;
  const minTargetN = Math.ceil(minSum / modN);
  const maxTargetN = Math.floor(maxSum / modN);
  if (maxTargetN < minTargetN) {
    const a = randInt(minMag, maxMag);
    return [sign * a, -sign * a];
  }
  const targetN = randInt(minTargetN, maxTargetN);
  const target = targetN * modN;
  const aMin = Math.max(minMag, target - maxMag);
  const aMax = Math.min(maxMag, target - minMag);
  if (aMax < aMin) {
    const a = randInt(minMag, maxMag);
    return [sign * a, -sign * a];
  }
  const a = randInt(aMin, aMax);
  const b = target - a;
  return [sign * a, sign * b];
}

// Chain mode: each row has 7 cells: first cell is a number, the other 6 cells are operations.
// Example: 50  [×12] [÷4] [×7] [÷3] ... = ?
// Students can select the left number too. Two selected cells merge into one cell.
function displayNum(n) {
  if (Math.abs(n) >= 1000000) return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return String(n);
}
function displayChainCell(cell) {
  if (!cell) return '';
  if (cell.type === 'num') return displayNum(cell.n);
  return `${cell.op}${displayNum(cell.n)}`;
}
function getChainCellValue(cell) {
  return cell ? cell.n : 0;
}
function makeNum(n) { return { type: 'num', n }; }
function makeOp(op, n) { return { type: 'op', op, n }; }

function getChainBanks() {
  return [
    // Lv.0：兩位數起始，容易約分
    [
      { start: 80,  ops: [makeOp('×',6),  makeOp('÷',3),  makeOp('×',11), makeOp('÷',2),  makeOp('×',5),  makeOp('÷',10)] },
      { start: 36,  ops: [makeOp('×',8),  makeOp('÷',9),  makeOp('×',5),  makeOp('÷',2),  makeOp('×',7),  makeOp('÷',10)] },
      { start: 25,  ops: [makeOp('×',14), makeOp('÷',5),  makeOp('×',6),  makeOp('÷',3),  makeOp('×',4),  makeOp('÷',2)] },
      { start: 39,  ops: [makeOp('×',5),  makeOp('÷',3),  makeOp('×',12), makeOp('÷',4),  makeOp('×',2),  makeOp('÷',10)] },
      { start: 50,  ops: [makeOp('×',12), makeOp('÷',4),  makeOp('×',7),  makeOp('÷',3),  makeOp('×',5),  makeOp('÷',10)] },
      { start: 42,  ops: [makeOp('×',10), makeOp('÷',7),  makeOp('×',9),  makeOp('÷',3),  makeOp('×',5),  makeOp('÷',6)] },
      { start: 54,  ops: [makeOp('×',10), makeOp('÷',9),  makeOp('×',8),  makeOp('÷',6),  makeOp('×',7),  makeOp('÷',4)] }
    ],
    // Lv.1：加入較大的兩位數
    [
      { start: 72,  ops: [makeOp('×',15), makeOp('÷',9),  makeOp('×',8),  makeOp('÷',6),  makeOp('×',5),  makeOp('÷',10)] },
      { start: 84,  ops: [makeOp('×',25), makeOp('÷',7),  makeOp('×',6),  makeOp('÷',3),  makeOp('×',4),  makeOp('÷',8)] },
      { start: 96,  ops: [makeOp('×',35), makeOp('÷',8),  makeOp('×',9),  makeOp('÷',3),  makeOp('×',2),  makeOp('÷',10)] },
      { start: 75,  ops: [makeOp('×',16), makeOp('÷',5),  makeOp('×',7),  makeOp('÷',4),  makeOp('×',3),  makeOp('÷',6)] },
      { start: 64,  ops: [makeOp('×',45), makeOp('÷',8),  makeOp('×',6),  makeOp('÷',9),  makeOp('×',5),  makeOp('÷',10)] },
      { start: 81,  ops: [makeOp('×',14), makeOp('÷',9),  makeOp('×',12), makeOp('÷',6),  makeOp('×',5),  makeOp('÷',7)] },
      { start: 90,  ops: [makeOp('×',16), makeOp('÷',10), makeOp('×',21), makeOp('÷',7),  makeOp('×',4),  makeOp('÷',6)] }
    ],
    // Lv.2：百位數起始
    [
      { start: 120, ops: [makeOp('×',12), makeOp('÷',6),  makeOp('×',25), makeOp('÷',5),  makeOp('×',4),  makeOp('÷',8)] },
      { start: 150, ops: [makeOp('×',18), makeOp('÷',9),  makeOp('×',14), makeOp('÷',7),  makeOp('×',5),  makeOp('÷',10)] },
      { start: 240, ops: [makeOp('×',15), makeOp('÷',8),  makeOp('×',6),  makeOp('÷',3),  makeOp('×',7),  makeOp('÷',5)] },
      { start: 360, ops: [makeOp('×',25), makeOp('÷',9),  makeOp('×',8),  makeOp('÷',4),  makeOp('×',3),  makeOp('÷',10)] },
      { start: 480, ops: [makeOp('×',35), makeOp('÷',6),  makeOp('×',12), makeOp('÷',4),  makeOp('×',5),  makeOp('÷',10)] },

function generateChainGame() {
  const banks = getChainBanks();
  const level = Math.min(chainLevel, banks.length - 1);
  const bank = shuffle(banks[level].map(row => ({
    start: row.start,
    ops: row.ops.map(op => ({ ...op }))
  })));
  return bank.slice(0, 5).map(row => ({
    cells: [makeNum(row.start), ...row.ops.map(op => ({ ...op }))]
  }));
}

function normalizeOpCell(cell) {
  // ×1 does not need to stay as an operation; ÷1 also does nothing.
  if (cell.type === 'op' && cell.n === 1) return null;
  return cell;
}

function canUseSimpleDigitMultiply(rowCellCount, ...nums) {
  return rowCellCount <= 4 && nums.every(n => Number.isInteger(n) && Math.abs(n) <= 9);
}

function getChainMerge(a, b, rowCellCount = 7) {
  if (!a || !b) return null;

  // Number + operation: actually calculate the number.
  if (a.type === 'num' && b.type === 'op') {
    if (b.op === '×') {
      const value = a.n * b.n;
      if (value % 10 === 0 || canUseSimpleDigitMultiply(rowCellCount, b.n)) {
        return { cell: makeNum(value), text: `${a.n}×${b.n}=${value}` };
      }
    }
    if (b.op === '÷' && b.n !== 0 && a.n % b.n === 0) {
      return { cell: makeNum(a.n / b.n), text: `${a.n}÷${b.n}=${a.n / b.n}` };
    }
    return null;
  }
  if (a.type === 'op' && b.type === 'num') return getChainMerge(b, a, rowCellCount);

  // Operation + operation: simplify signs first, then keep it as one operation cell.
  if (a.type === 'op' && b.type === 'op') {
    if (a.op === '×' && b.op === '×') {
      const value = a.n * b.n;
      if (value % 10 === 0 || canUseSimpleDigitMultiply(rowCellCount, a.n, b.n)) {
        return { cell: makeOp('×', value), text: `×${a.n}×${b.n}=×${value}` };
      }
      return null;
    }
    if (a.op === '×' && b.op === '÷') {
      if (a.n % b.n === 0) {
        const cell = normalizeOpCell(makeOp('×', a.n / b.n));
        return { cell, text: `×${a.n}÷${b.n}=${cell ? displayChainCell(cell) : '×1'}` };
      }
      if (b.n % a.n === 0) {
        const cell = normalizeOpCell(makeOp('÷', b.n / a.n));
        return { cell, text: `×${a.n}÷${b.n}=${cell ? displayChainCell(cell) : '×1'}` };
      }
      return null;
    }
    if (a.op === '÷' && b.op === '×') return getChainMerge(b, a, rowCellCount);
    if (a.op === '÷' && b.op === '÷') {
      const value = a.n * b.n;
      return { cell: makeOp('÷', value), text: `÷${a.n}÷${b.n}=÷${value}` };
    }
  }

  // Two plain numbers should rarely appear, but allow the original number-pair rule.
  if (a.type === 'num' && b.type === 'num') {
    const big = Math.max(Math.abs(a.n), Math.abs(b.n));
    const small = Math.min(Math.abs(a.n), Math.abs(b.n));
    if (small !== 0 && big % small === 0) return { cell: makeNum(big / small), text: `${big}÷${small}=${big / small}` };
    if ((a.n * b.n) % 10 === 0 || canUseSimpleDigitMultiply(rowCellCount, a.n, b.n)) {
      return { cell: makeNum(a.n * b.n), text: `${a.n}×${b.n}=${a.n * b.n}` };
    }
  }
  return null;
}

function isValidChainPair(a, b, rowCellCount = 7) {
  return !!getChainMerge(a, b, rowCellCount);
}

function isSingleDigitCell(cell) {
  return cell && cell.type === 'num' && Number.isInteger(cell.n) && Math.abs(cell.n) <= 9;
}

function canFinishWithThreeDigits(cells) {
  if (!cells || cells.length !== 3) return false;
  if (!cells.every(isSingleDigitCell)) return false;
  const product = cells.reduce((acc, cell) => acc * cell.n, 1);
  return product % 10 === 0;
}

function getChainRowAnswer(q) {
  if (!q || !q.cells || q.cells.length === 0) return null;
  if (q.cells.length === 1 && q.cells[0].type === 'num') return q.cells[0].n;
  if (canFinishWithThreeDigits(q.cells)) return q.cells.reduce((acc, cell) => acc * cell.n, 1);
  return null;
}

function isChainRowComplete(q) {
  return getChainRowAnswer(q) !== null;
}

function updateChainProgress() {
  chainCompletedRows = chainQuestions.filter(isChainRowComplete).length;
  document.getElementById('stat1Value').textContent = chainCompletedRows;
}

let currentMode = 'add100';
let chainLevel = 0; // 乘除題每按一次新局就升級
let tiles = [];
let selected = [];
let pairsFound = 0;
let attempts = 0;
let startTime = null;
let timerInterval = null;
let busy = false;

// Chain mode state
let chainQuestions = [];
let chainSelection = null; // {row, idx} | null
let chainCompletedRows = 0;
let chainSuccessfulMoves = 0;

function getMode() { return MODES[currentMode]; }

// === MATCH MODE ===
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const mode = getMode();
  tiles.forEach((val, idx) => {
    const tile = document.createElement('div');
    tile.dataset.idx = idx;
    if (val === null || val === undefined) {
      tile.className = 'tile empty';
    } else {
      const sign = mode.isNeg(val) ? 'neg' : 'pos';
      const size = mode.lenClass(val);
      tile.className = `tile ${sign} ${size}`.trim();
      tile.textContent = mode.display(val);
      tile.addEventListener('click', () => clickTile(idx));
      tile.addEventListener('touchstart', (e) => { e.preventDefault(); clickTile(idx); }, {passive: false});
    }
    grid.appendChild(tile);
  });
  selected.forEach(i => {
    const el = document.querySelector(`.tile[data-idx="${i}"]`);
    if (el) el.classList.add('selected');
  });
}

function clickTile(idx) {
  if (busy) return;
  if (tiles[idx] === null || tiles[idx] === undefined) return;
  const tileEl = document.querySelector(`.tile[data-idx="${idx}"]`);
  if (!tileEl) return;
  
  const selIdx = selected.indexOf(idx);
  if (selIdx !== -1) {
    selected.splice(selIdx, 1);
    tileEl.classList.remove('selected');
    updateFormula();
    return;
  }
  if (selected.length >= 2) return;
  
  selected.push(idx);
  tileEl.classList.add('selected');
  updateFormula();
  
  if (selected.length === 2) {
    attempts++;
    document.getElementById('stat2Value').textContent = attempts;
    const a = tiles[selected[0]];
    const b = tiles[selected[1]];
    const mode = getMode();
    
    if (mode.validate(a, b)) {
      busy = true;
      setTimeout(() => {
        const sel = [...selected];
        sel.forEach(i => {
          const el = document.querySelector(`.tile[data-idx="${i}"]`);
          if (el) { el.classList.remove('selected'); el.classList.add('success'); }
        });
        burstConfetti();
        setTimeout(() => {
          sel.forEach(i => { tiles[i] = null; });
          selected = [];
          pairsFound++;
          document.getElementById('stat1Value').textContent = pairsFound;
          renderGrid();
          updateFormula();
          busy = false;
          if (pairsFound === 12) winGame();
        }, 500);
      }, 450);
    } else {
      busy = true;
      setTimeout(() => {
        const sel = [...selected];
        sel.forEach(i => {
          const el = document.querySelector(`.tile[data-idx="${i}"]`);
          if (el) el.classList.add('shake');
        });
        setTimeout(() => {
          sel.forEach(i => {
            const el = document.querySelector(`.tile[data-idx="${i}"]`);
            if (el) el.classList.remove('selected', 'shake');
          });
          selected = [];
          updateFormula();
          busy = false;
        }, 450);
      }, 500);
    }
  }
}

function updateFormula() {
  const mode = getMode();
  if (mode.type !== 'match') return;
  const sel1 = document.getElementById('sel1');
  const sel2 = document.getElementById('sel2');
  const result = document.getElementById('selResult');
  const opEl = document.getElementById('op');
  opEl.textContent = mode.formulaOp;
  if (selected.length >= 1) {
    const v = tiles[selected[0]];
    sel1.textContent = mode.display(v);
    sel1.className = `f-num ${mode.isNeg(v) ? 'neg' : 'pos'} ${mode.lenClass(v)}`.trim();
  } else {
    sel1.textContent = '?';
    sel1.className = 'f-num empty';
  }
  if (selected.length >= 2) {
    const v1 = tiles[selected[0]];
    const v2 = tiles[selected[1]];
    sel2.textContent = mode.display(v2);
    sel2.className = `f-num ${mode.isNeg(v2) ? 'neg' : 'pos'} ${mode.lenClass(v2)}`.trim();
    const valid = mode.validate(v1, v2);
    const res = mode.compute(v1, v2);
    result.textContent = res;
    result.className = `f-result ${sizeClass(res)} ${valid ? 'valid' : 'invalid'}`.trim();
  } else {
    sel2.textContent = '?';
    sel2.className = 'f-num empty';
    result.textContent = '?';
    result.className = 'f-result';
  }
}

// === CHAIN MODE ===
function renderChain() {
  const container = document.getElementById('chainContainer');
  container.innerHTML = '';
  chainQuestions.forEach((q, rowIdx) => {
    const row = document.createElement('div');
    row.className = 'chain-row';
    const rowComplete = isChainRowComplete(q);
    q.cells.forEach((cellData, idx) => {
      const cell = document.createElement('div');
      cell.dataset.row = rowIdx;
      cell.dataset.idx = idx;
      const cls = ['chain-cell', cellData.type === 'num' ? 'start' : 'op', sizeClass(displayChainCell(cellData))];
      if (!rowComplete) cls.push('clickable');
      if (chainSelection && chainSelection.row === rowIdx && chainSelection.idx === idx) cls.push('selected');
      if (rowComplete) cls.push('complete');
      cell.className = cls.filter(Boolean).join(' ');
      cell.textContent = displayChainCell(cellData);
      if (!rowComplete) {
        cell.addEventListener('click', () => clickChainOp(rowIdx, idx));
        cell.addEventListener('touchstart', (e) => { e.preventDefault(); clickChainOp(rowIdx, idx); }, {passive: false});
      }
      row.appendChild(cell);
    });

    const eq = document.createElement('div');
    eq.className = 'chain-equals';
    eq.textContent = '=';
    row.appendChild(eq);

    const answerCell = document.createElement('div');
    answerCell.className = 'chain-cell answer';
    const answerValue = getChainRowAnswer(q);
    if (answerValue !== null) {
      answerCell.classList.add('complete');
      answerCell.textContent = displayNum(answerValue);
    } else {
      answerCell.textContent = '?';
    }
    row.appendChild(answerCell);
    container.appendChild(row);
  });
}

function clickChainOp(rowIdx, idx) {
  if (busy) return;
  const q = chainQuestions[rowIdx];
  if (!q || isChainRowComplete(q) || q.cells.length <= 1) return;
  const sel = chainSelection;
  if (!sel) {
    chainSelection = { row: rowIdx, idx };
    renderChain();
    return;
  }
  if (sel.row === rowIdx && sel.idx === idx) {
    chainSelection = null;
    renderChain();
    return;
  }
  if (sel.row !== rowIdx) {
    chainSelection = { row: rowIdx, idx };
    renderChain();
    return;
  }

  const a = q.cells[sel.idx];
  const b = q.cells[idx];
  const merged = getChainMerge(a, b, q.cells.length);
  attempts++;
  document.getElementById('stat2Value').textContent = attempts;

  if (merged) {
    const wasComplete = isChainRowComplete(q);
    const removeA = Math.max(sel.idx, idx);
    const removeB = Math.min(sel.idx, idx);
    q.cells.splice(removeA, 1);
    q.cells.splice(removeB, 1);
    if (merged.cell) q.cells.splice(removeB, 0, merged.cell);
    chainSelection = null;
    pairsFound++;
    chainSuccessfulMoves++;
    renderChain();
    burstConfetti();
    const nowComplete = isChainRowComplete(q);
    if (!wasComplete && nowComplete) updateChainProgress();
    if (chainCompletedRows === getMode().target) winGame();
  } else {
    busy = true;
    const c1 = document.querySelector(`.chain-cell[data-row="${sel.row}"][data-idx="${sel.idx}"]`);
    const c2 = document.querySelector(`.chain-cell[data-row="${rowIdx}"][data-idx="${idx}"]`);
    if (c1) c1.classList.add('shake');
    if (c2) c2.classList.add('shake');
    setTimeout(() => {
      chainSelection = null;
      busy = false;
      renderChain();
    }, 450);
  }
}

// === SHARED ===
function clearSelection() {
  if (busy) return;
  const mode = getMode();
  if (mode.type === 'match') {
    selected.forEach(i => {
      const el = document.querySelector(`.tile[data-idx="${i}"]`);
      if (el) el.classList.remove('selected');
    });
    selected = [];
    updateFormula();
  } else if (mode.type === 'chain') {
    if (chainSelection) {
      chainSelection = null;
      renderChain();
    }
  }
}

function showHint() {
  if (busy) return;
  const mode = getMode();
  if (mode.type === 'match') {
    clearSelection();
    const remaining = [];
    tiles.forEach((v, i) => { if (v !== null && v !== undefined) remaining.push(i); });
    for (let i = 0; i < remaining.length; i++) {
      for (let j = i + 1; j < remaining.length; j++) {
        if (mode.validate(tiles[remaining[i]], tiles[remaining[j]])) {
          const el = document.querySelector(`.tile[data-idx="${remaining[i]}"]`);
          if (el) {
            el.classList.add('hint');
            setTimeout(() => el.classList.remove('hint'), 1700);
          }
          return;
        }
      }
    }
    document.getElementById('winEmoji').textContent = '😅';
    document.getElementById('winTitle').textContent = '沒辦法繼續了';
    document.getElementById('stars').textContent = '';
    document.getElementById('winStats').innerHTML = 
      `剩下的格子無法配對<br>清掉了 <strong>${pairsFound}</strong> 對，再試一次吧！`;
    document.getElementById('overlay').classList.add('show');
  } else if (mode.type === 'chain') {
    clearSelection();
    for (let r = 0; r < chainQuestions.length; r++) {
      const cells = chainQuestions[r].cells;
      if (isChainRowComplete(chainQuestions[r]) || cells.length <= 1) continue;
      for (let i = 0; i < cells.length; i++) {
        for (let j = i + 1; j < cells.length; j++) {
          if (isValidChainPair(cells[i], cells[j], cells.length)) {
            const c1 = document.querySelector(`.chain-cell[data-row="${r}"][data-idx="${i}"]`);
            const c2 = document.querySelector(`.chain-cell[data-row="${r}"][data-idx="${j}"]`);
            if (c1) { c1.classList.add('hint'); setTimeout(() => c1.classList.remove('hint'), 1700); }
            if (c2) { c2.classList.add('hint'); setTimeout(() => c2.classList.remove('hint'), 1700); }
            return;
          }
        }
      }
    }
    document.getElementById('winEmoji').textContent = '😅';
    document.getElementById('winTitle').textContent = '沒辦法繼續了';
    document.getElementById('stars').textContent = '';
    document.getElementById('winStats').innerHTML = 
      `剩下的數字無法合併<br>已完成 <strong>${chainCompletedRows}</strong> 行，再試一次吧！`;
    document.getElementById('overlay').classList.add('show');
  }
}

function startTimer() {
  startTime = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function winGame() {
  clearInterval(timerInterval);
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  const accuracyBase = getMode().type === 'chain' ? chainSuccessfulMoves : getMode().target;
  const accuracy = attempts ? Math.round(accuracyBase / attempts * 100) : 100;
  let stars = '⭐';
  if (accuracy >= 60) stars = '⭐⭐';
  if (accuracy >= 85) stars = '⭐⭐⭐';
  document.getElementById('winEmoji').textContent = '🎉';
  document.getElementById('winTitle').textContent = '全部完成！';
  document.getElementById('stars').textContent = stars;
  document.getElementById('winStats').innerHTML = 
    `⏱ 用時 <strong>${m}:${s.toString().padStart(2,'0')}</strong><br>
     🎯 出手 <strong>${attempts}</strong> 次<br>
     📊 準確率 <strong>${accuracy}%</strong>`;
  document.getElementById('overlay').classList.add('show');
  for (let i = 0; i < 40; i++) {
    setTimeout(() => burstConfetti(true), i * 50);
  }
}

function burstConfetti(big = false) {
  const colors = ['#f59e0b', '#ec4899', '#8b5cf6', '#10b981', '#3b82f6', '#ef4444'];
  const count = big ? 1 : 8;
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.left = (Math.random() * 100) + 'vw';
    c.style.top = big ? '-10px' : (40 + Math.random() * 30) + 'vh';
    c.style.borderRadius = Math.random() < 0.5 ? '50%' : '2px';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    const duration = 1.5 + Math.random() * 1.5;
    c.style.animation = `fall ${duration}s ease-in forwards`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), duration * 1000);
  }
}

function updateRulesAndStats() {
  const mode = getMode();
  document.getElementById('rulesText').textContent = mode.rule;
  document.getElementById('subtitle').textContent = mode.subtitle;
  const ex = document.getElementById('rulesExamples');
  ex.innerHTML = '';
  mode.examples.forEach(e => {
    const span = document.createElement('span');
    span.className = 'ex';
    span.textContent = e;
    ex.appendChild(span);
  });
  document.getElementById('statLabel1').textContent = mode.statLabel1;
  document.getElementById('stat1Total').textContent = `/${mode.target}`;
}

function switchUIForMode() {
  const mode = getMode();
  const isMatch = mode.type === 'match';
  document.getElementById('formula').style.display = isMatch ? 'flex' : 'none';
  document.getElementById('grid').style.display = isMatch ? 'grid' : 'none';
  document.getElementById('chainContainer').style.display = isMatch ? 'none' : 'flex';
}

function switchMode(mode) {
  if (currentMode === mode) return;
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  updateRulesAndStats();
  switchUIForMode();
  newGame();
}

function newGame() {
  busy = false;
  selected = [];
  pairsFound = 0;
  attempts = 0;
  chainSelection = null;
  chainCompletedRows = 0;
  chainSuccessfulMoves = 0;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('stat1Value').textContent = '0';
  document.getElementById('stat2Value').textContent = '0';
  const mode = getMode();
  if (mode.type === 'match') {
    tiles = mode.generate();
    renderGrid();
    updateFormula();
  } else if (mode.type === 'chain') {
    chainQuestions = mode.generate();
    updateChainProgress();
    renderChain();
    chainLevel++;
  }
  startTimer();
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

updateRulesAndStats();
switchUIForMode();
newGame();
</script>
</body>
</html>
